name: taskmaster
description: A polished Task Management app built with Flutter + FastAPI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # Date picker
  intl: ^0.19.0

  # Local draft persistence
  shared_preferences: ^2.3.2

  # Icons
  cupertino_icons: ^1.0.8

  # Animations
  flutter_animate: ^4.5.0

  # Shimmer loading effect
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true